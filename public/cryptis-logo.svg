<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5D76E"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon ring -->
  <polygon points="60,6 106,29 106,75 60,98 14,75 14,29"
           fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.3"/>

  <!-- Inner hexagon -->
  <polygon points="60,14 100,33 100,71 60,90 20,71 20,33"
           fill="rgba(212,175,55,0.05)" stroke="#D4AF37" stroke-width="2" opacity="0.8"
           filter="url(#glow)"/>

  <!-- Blockchain node dots on hexagon vertices -->
  <circle cx="60" cy="14" r="2.5" fill="#D4AF37" opacity="0.7"/>
  <circle cx="100" cy="33" r="2.5" fill="#D4AF37" opacity="0.7"/>
  <circle cx="100" cy="71" r="2.5" fill="#D4AF37" opacity="0.7"/>
  <circle cx="60" cy="90" r="2.5" fill="#D4AF37" opacity="0.7"/>
  <circle cx="20" cy="71" r="2.5" fill="#D4AF37" opacity="0.7"/>
  <circle cx="20" cy="33" r="2.5" fill="#D4AF37" opacity="0.7"/>

  <!-- Connection lines from center to vertices (blockchain network) -->
  <line x1="60" y1="52" x2="60" y2="14" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>
  <line x1="60" y1="52" x2="100" y2="33" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>
  <line x1="60" y1="52" x2="100" y2="71" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>
  <line x1="60" y1="52" x2="60" y2="90" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>
  <line x1="60" y1="52" x2="20" y2="71" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>
  <line x1="60" y1="52" x2="20" y2="33" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>

  <!-- Shield shape in center -->
  <path d="M60,28 L80,38 L80,58 Q80,72 60,80 Q40,72 40,58 L40,38 Z"
        fill="rgba(212,175,55,0.08)" stroke="url(#goldGrad)" stroke-width="2"
        filter="url(#glow)"/>

  <!-- Lock body -->
  <rect x="50" y="50" width="20" height="16" rx="2"
        fill="rgba(0,229,255,0.15)" stroke="#00E5FF" stroke-width="1.5"/>

  <!-- Lock shackle -->
  <path d="M53,50 L53,44 Q53,38 60,38 Q67,38 67,44 L67,50"
        fill="none" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Keyhole -->
  <circle cx="60" cy="56" r="2.5" fill="#00E5FF" opacity="0.8"/>
  <rect x="59" y="56" width="2" height="5" rx="0.5" fill="#00E5FF" opacity="0.8"/>

  <!-- Scanning line effect -->
  <line x1="30" y1="52" x2="90" y2="52" stroke="#D4AF37" stroke-width="0.5" opacity="0.1"/>

  <!-- Bottom accent text area -->
  <text x="60" y="108" text-anchor="middle" font-family="monospace" font-size="9"
        fill="#D4AF37" letter-spacing="3" font-weight="700" opacity="0.5">CRYPTIS</text>
</svg>
